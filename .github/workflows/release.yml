name: Build platform binaries

# On a version tag (or manual run), build the self-contained `engram` binary for
# mac (arm64) and Linux (x86_64), then commit them into bin/ so the marketplace
# repo ships zero-setup binaries. (Intel-Mac `macos-13` is intentionally omitted:
# GitHub is deprecating those free runners and jobs queue indefinitely; Intel-Mac
# users are covered by the uv/semantic path. arm64 + Linux cover the rest.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0  # no floating v8 major tag published yet
      - name: Build binary
        # Build into a CLEAN staging dir, not the committed bin/. Otherwise the
        # artifact would also carry the OTHER platform's stale binary from the
        # checkout, and the commit job's collect-by-arch step could (and did)
        # resurrect it via a last-writer-wins race.
        run: ENGRAM_BIN_DIR=stage bash scripts/build_binary.sh
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.os }}
          # Upload stage/ (not a glob): upload-artifact strips the common
          # ancestor, leaving the <os>_<arch>/ prefix we rely on — and stage/
          # holds ONLY this runner's freshly-built arch.
          path: stage
          if-no-files-found: error

  commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect binaries into bin/
        run: |
          mkdir -p bin
          # Each artifact dir contains <os>_<arch>/engram. Find every engram
          # binary and place it under bin/<os>_<arch>/, regardless of the
          # artifact wrapper-dir name.
          found=0
          while IFS= read -r f; do
            d=$(basename "$(dirname "$f")")   # e.g. linux_x86_64
            mkdir -p "bin/$d"
            cp -v "$f" "bin/$d/engram"
            chmod +x "bin/$d/engram"
            found=$((found+1))
          done < <(find artifacts -type f -name engram)
          echo "collected $found binaries"
          [ "$found" -gt 0 ] || { echo "::error::no binaries collected"; exit 1; }
          ls -R bin
      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/
          git commit -m "ci: platform binaries for ${GITHUB_REF_NAME:-manual}" || { echo "no changes"; exit 0; }
          git push origin HEAD:main

      # Human-facing release notes only. NOT a delivery channel: Claude Code installs
      # plugins from the git tree (cloned repo), never from Release assets — so the
      # binaries above still ship via bin/ on main. This just gives each tag a
      # Release page with the changelog and attaches the binaries for direct download.
      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true  # nice-to-have notes; binaries already shipped via bin/ on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes=$(awk -v ver="${GITHUB_REF_NAME#v}" '
            $0 ~ "^## \\[" ver "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md)
          [ -n "$notes" ] || notes="See CHANGELOG.md for details."
          # Split create-notes from upload-assets: gh release create with inline
          # assets is atomic — a flaky asset upload (HTTP 404) rolls back the whole
          # release. And both binaries are named "engram", so they're copied to
          # distinct asset names first.
          cp bin/darwin_arm64/engram engram-darwin-arm64
          cp bin/linux_x86_64/engram engram-linux-x86_64
          gh release create "$GITHUB_REF_NAME" --title "engram $GITHUB_REF_NAME" --notes "$notes" \
            || gh release edit "$GITHUB_REF_NAME" --notes "$notes"
          gh release upload "$GITHUB_REF_NAME" engram-darwin-arm64 engram-linux-x86_64 --clobber
