name: Build platform binaries

# On a version tag (or manual run), build the self-contained `engram` binary for
# mac (arm64) and Linux (x86_64), then commit them into bin/ so the marketplace
# repo ships zero-setup binaries. (Intel-Mac `macos-13` is intentionally omitted:
# GitHub is deprecating those free runners and jobs queue indefinitely; Intel-Mac
# users are covered by the uv/semantic path. arm64 + Linux cover the rest.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build binary
        run: bash scripts/build_binary.sh
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.os }}
          # Upload the bin/ dir (not a glob): upload-artifact strips the common
          # ancestor, so a glob would drop the <os>_<arch>/ prefix we rely on.
          path: bin
          if-no-files-found: error

  commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect binaries into bin/
        run: |
          mkdir -p bin
          # Each artifact dir contains <os>_<arch>/engram. Find every engram
          # binary and place it under bin/<os>_<arch>/, regardless of the
          # artifact wrapper-dir name.
          found=0
          while IFS= read -r f; do
            d=$(basename "$(dirname "$f")")   # e.g. linux_x86_64
            mkdir -p "bin/$d"
            cp -v "$f" "bin/$d/engram"
            chmod +x "bin/$d/engram"
            found=$((found+1))
          done < <(find artifacts -type f -name engram)
          echo "collected $found binaries"
          [ "$found" -gt 0 ] || { echo "::error::no binaries collected"; exit 1; }
          ls -R bin
      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/
          git commit -m "ci: platform binaries for ${GITHUB_REF_NAME:-manual}" || { echo "no changes"; exit 0; }
          git push origin HEAD:main
